<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Хохломской Калькулятор</title>
<link href="https://fonts.googleapis.com/css2?family=Marko+One&family=Philosopher:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #D4A017;
    --deep-gold: #B8860B;
    --bright-gold: #FFD700;
    --red: #C0392B;
    --dark-red: #8B1A1A;
    --black: #1A0A00;
    --deep-black: #0D0500;
    --orange: #E8650A;
    --cream: #FFF8DC;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: var(--deep-black);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Philosopher', serif;
    overflow: hidden;
    position: relative;
  }

  /* Фоновый узор */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(ellipse at 20% 20%, rgba(180,130,10,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(192,57,43,0.08) 0%, transparent 50%);
    pointer-events: none;
  }

  /* SVG-орнамент фона */
  .bg-ornament {
    position: fixed;
    inset: 0;
    opacity: 0.07;
    pointer-events: none;
    z-index: 0;
  }

  .calc-wrapper {
    position: relative;
    z-index: 1;
    padding: 6px;
    border-radius: 20px;
    background: linear-gradient(145deg, var(--bright-gold), var(--deep-gold), var(--orange), var(--gold));
    box-shadow:
      0 0 60px rgba(212, 160, 23, 0.4),
      0 0 120px rgba(212, 160, 23, 0.15),
      inset 0 1px 0 rgba(255,255,255,0.3);
    animation: glow-pulse 3s ease-in-out infinite;
  }

  @keyframes glow-pulse {
    0%, 100% { box-shadow: 0 0 60px rgba(212,160,23,0.4), 0 0 120px rgba(212,160,23,0.15), inset 0 1px 0 rgba(255,255,255,0.3); }
    50% { box-shadow: 0 0 80px rgba(212,160,23,0.6), 0 0 160px rgba(212,160,23,0.25), inset 0 1px 0 rgba(255,255,255,0.3); }
  }

  .calc-body {
    background: linear-gradient(160deg, #1A0A00 0%, #2A0E00 40%, #1A0800 100%);
    border-radius: 16px;
    padding: 0;
    width: 340px;
    overflow: hidden;
    border: 2px solid rgba(212,160,23,0.3);
    position: relative;
  }

  /* Верхняя декоративная полоса */
  .top-banner {
    background: linear-gradient(90deg, var(--dark-red), #6B0F0F, var(--red), #6B0F0F, var(--dark-red));
    padding: 10px 20px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .top-banner::before, .top-banner::after {
    content: '✦';
    position: absolute;
    color: var(--gold);
    font-size: 12px;
    top: 50%;
    transform: translateY(-50%);
    opacity: 0.7;
  }
  .top-banner::before { left: 12px; }
  .top-banner::after { right: 12px; }

  .top-banner h1 {
    font-family: 'Marko One', serif;
    font-size: 13px;
    color: var(--bright-gold);
    letter-spacing: 3px;
    text-transform: uppercase;
    text-shadow: 0 0 10px rgba(255,215,0,0.5);
  }

  /* Орнаментальный ряд */
  .ornament-row {
    background: var(--black);
    padding: 6px 0;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 0;
    overflow: hidden;
    height: 28px;
  }

  .ornament-row svg {
    width: 100%;
    height: 28px;
  }

  /* Дисплей */
  .display-area {
    background: linear-gradient(180deg, #0A0300 0%, #120600 100%);
    margin: 0;
    padding: 16px 20px 14px;
    border-top: 1px solid rgba(212,160,23,0.2);
    border-bottom: 1px solid rgba(212,160,23,0.2);
    position: relative;
  }

  .display-area::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: linear-gradient(90deg, transparent 0%, rgba(212,160,23,0.03) 50%, transparent 100%);
    pointer-events: none;
  }

  .display-expression {
    color: rgba(212,160,23,0.5);
    font-size: 12px;
    text-align: right;
    min-height: 18px;
    letter-spacing: 1px;
    font-style: italic;
    padding-right: 2px;
  }

  .display-main {
    color: var(--bright-gold);
    font-size: 42px;
    text-align: right;
    font-family: 'Marko One', serif;
    letter-spacing: 2px;
    text-shadow:
      0 0 20px rgba(255,215,0,0.6),
      0 0 40px rgba(255,215,0,0.2);
    line-height: 1.1;
    word-break: break-all;
    min-height: 52px;
    transition: text-shadow 0.15s;
  }

  .display-main.flash {
    text-shadow: 0 0 40px rgba(255,215,0,1), 0 0 80px rgba(255,215,0,0.5);
  }

  /* Кнопки */
  .buttons-area {
    padding: 16px 16px 20px;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
  }

  .btn {
    position: relative;
    height: 58px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    font-family: 'Philosopher', serif;
    font-size: 18px;
    font-weight: 700;
    transition: transform 0.08s, filter 0.08s;
    outline: none;
    overflow: hidden;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  .btn::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 12px;
    background: radial-gradient(ellipse at 50% 0%, rgba(255,255,255,0.15) 0%, transparent 70%);
    pointer-events: none;
  }

  .btn:active {
    transform: scale(0.93);
    filter: brightness(1.3);
  }

  /* Цифры */
  .btn-num {
    background: linear-gradient(160deg, #3D1A00 0%, #2A1000 60%, #1E0B00 100%);
    color: var(--cream);
    border: 1.5px solid rgba(212,160,23,0.25);
    box-shadow:
      0 4px 8px rgba(0,0,0,0.5),
      0 1px 0 rgba(212,160,23,0.1) inset;
    text-shadow: 0 1px 3px rgba(0,0,0,0.8);
  }

  .btn-num:hover {
    background: linear-gradient(160deg, #4D2200 0%, #3A1600 60%, #2A1000 100%);
    border-color: rgba(212,160,23,0.5);
  }

  /* Операторы */
  .btn-op {
    background: linear-gradient(160deg, var(--dark-red) 0%, #7A1010 60%, #5A0A0A 100%);
    color: var(--bright-gold);
    border: 1.5px solid rgba(255,215,0,0.3);
    box-shadow:
      0 4px 10px rgba(139,26,26,0.5),
      0 1px 0 rgba(255,200,0,0.2) inset;
    text-shadow: 0 0 8px rgba(255,215,0,0.5);
  }

  .btn-op:hover {
    background: linear-gradient(160deg, var(--red) 0%, #9A1515 60%, #7A0D0D 100%);
    border-color: rgba(255,215,0,0.6);
  }

  /* Специальные */
  .btn-special {
    background: linear-gradient(160deg, #2A1F00 0%, #1E1600 60%, #141000 100%);
    color: var(--gold);
    border: 1.5px solid rgba(212,160,23,0.35);
    box-shadow:
      0 4px 8px rgba(0,0,0,0.5),
      0 1px 0 rgba(212,160,23,0.15) inset;
    font-size: 14px;
    letter-spacing: 0.5px;
  }

  .btn-special:hover {
    background: linear-gradient(160deg, #3A2A00 0%, #2A1E00 60%, #1E1400 100%);
    border-color: rgba(212,160,23,0.6);
  }

  /* Равно — самая нарядная кнопка */
  .btn-equals {
    background: linear-gradient(160deg, var(--bright-gold) 0%, var(--gold) 50%, var(--deep-gold) 100%);
    color: var(--deep-black);
    border: 2px solid rgba(255,240,100,0.6);
    box-shadow:
      0 4px 16px rgba(212,160,23,0.6),
      0 1px 0 rgba(255,255,200,0.5) inset;
    font-size: 22px;
    text-shadow: none;
  }

  .btn-equals:hover {
    background: linear-gradient(160deg, #FFE840 0%, var(--bright-gold) 50%, var(--gold) 100%);
    box-shadow: 0 4px 24px rgba(212,160,23,0.9), 0 1px 0 rgba(255,255,200,0.5) inset;
  }

  /* Ноль — широкий */
  .btn-zero {
    grid-column: span 2;
  }

  /* Нижний орнамент */
  .bottom-ornament {
    background: linear-gradient(90deg, var(--dark-red), #6B0F0F, var(--red), #6B0F0F, var(--dark-red));
    height: 10px;
  }

  /* Анимация нажатия */
  @keyframes press-ripple {
    0% { transform: scale(0); opacity: 0.6; }
    100% { transform: scale(4); opacity: 0; }
  }

  .ripple {
    position: absolute;
    border-radius: 50%;
    width: 20px; height: 20px;
    background: rgba(255,215,0,0.4);
    margin-top: -10px; margin-left: -10px;
    animation: press-ripple 0.4s ease-out forwards;
    pointer-events: none;
  }
</style>
</head>
<body>

<svg class="bg-ornament" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Фоновые декоративные листья -->
  <g fill="var(--gold)">
    <ellipse cx="50" cy="50" rx="30" ry="10" transform="rotate(-30 50 50)"/>
    <ellipse cx="750" cy="550" rx="30" ry="10" transform="rotate(150 750 550)"/>
    <ellipse cx="750" cy="50" rx="30" ry="10" transform="rotate(30 750 50)"/>
    <ellipse cx="50" cy="550" rx="30" ry="10" transform="rotate(-150 50 550)"/>
    <circle cx="50" cy="50" r="5"/><circle cx="750" cy="550" r="5"/>
    <circle cx="750" cy="50" r="5"/><circle cx="50" cy="550" r="5"/>
  </g>
  <g fill="var(--red)">
    <circle cx="100" cy="100" r="18"/>
    <circle cx="700" cy="500" r="18"/>
    <circle cx="700" cy="100" r="12"/>
    <circle cx="100" cy="500" r="12"/>
  </g>
</svg>

<div class="calc-wrapper">
  <div class="calc-body">

    <div class="top-banner">
      <h1>Хохломской Счётчик</h1>
    </div>

    <!-- Орнаментальный ряд — хохломской узор -->
    <div class="ornament-row">
      <svg viewBox="0 0 340 28" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
        <rect width="340" height="28" fill="#1A0A00"/>
        <!-- Золотые стебли -->
        <path d="M0,14 Q20,4 40,14 Q60,24 80,14 Q100,4 120,14 Q140,24 160,14 Q180,4 200,14 Q220,24 240,14 Q260,4 280,14 Q300,24 320,14 Q340,4 360,14" stroke="#D4A017" stroke-width="1.5" fill="none"/>
        <!-- Красные ягоды -->
        <circle cx="40" cy="14" r="4" fill="#C0392B"/><circle cx="40" cy="14" r="2" fill="#E05050"/>
        <circle cx="120" cy="14" r="4" fill="#C0392B"/><circle cx="120" cy="14" r="2" fill="#E05050"/>
        <circle cx="200" cy="14" r="4" fill="#C0392B"/><circle cx="200" cy="14" r="2" fill="#E05050"/>
        <circle cx="280" cy="14" r="4" fill="#C0392B"/><circle cx="280" cy="14" r="2" fill="#E05050"/>
        <!-- Золотые листики -->
        <ellipse cx="80" cy="8" rx="8" ry="3.5" transform="rotate(-20 80 8)" fill="#D4A017"/>
        <ellipse cx="160" cy="20" rx="8" ry="3.5" transform="rotate(20 160 20)" fill="#D4A017"/>
        <ellipse cx="240" cy="8" rx="8" ry="3.5" transform="rotate(-20 240 8)" fill="#D4A017"/>
        <ellipse cx="320" cy="20" rx="8" ry="3.5" transform="rotate(20 320 20)" fill="#D4A017"/>
        <!-- Маленькие точки -->
        <circle cx="60" cy="6" r="2" fill="#FFD700" opacity="0.7"/>
        <circle cx="100" cy="22" r="2" fill="#FFD700" opacity="0.7"/>
        <circle cx="180" cy="6" r="2" fill="#FFD700" opacity="0.7"/>
        <circle cx="260" cy="22" r="2" fill="#FFD700" opacity="0.7"/>
      </svg>
    </div>

    <div class="display-area">
      <div class="display-expression" id="expression"></div>
      <div class="display-main" id="display">0</div>
    </div>

    <div class="ornament-row">
      <svg viewBox="0 0 340 28" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
        <rect width="340" height="28" fill="#1A0A00"/>
        <path d="M0,14 Q20,24 40,14 Q60,4 80,14 Q100,24 120,14 Q140,4 160,14 Q180,24 200,14 Q220,4 240,14 Q260,24 280,14 Q300,4 320,14 Q340,24 360,14" stroke="#B8860B" stroke-width="1.5" fill="none"/>
        <circle cx="80" cy="14" r="3" fill="#8B1A1A"/><circle cx="80" cy="14" r="1.5" fill="#C0392B"/>
        <circle cx="160" cy="14" r="3" fill="#8B1A1A"/><circle cx="160" cy="14" r="1.5" fill="#C0392B"/>
        <circle cx="240" cy="14" r="3" fill="#8B1A1A"/><circle cx="240" cy="14" r="1.5" fill="#C0392B"/>
        <circle cx="320" cy="14" r="3" fill="#8B1A1A"/><circle cx="320" cy="14" r="1.5" fill="#C0392B"/>
        <ellipse cx="40" cy="20" rx="6" ry="2.5" transform="rotate(15 40 20)" fill="#E8650A" opacity="0.8"/>
        <ellipse cx="120" cy="8" rx="6" ry="2.5" transform="rotate(-15 120 8)" fill="#E8650A" opacity="0.8"/>
        <ellipse cx="200" cy="20" rx="6" ry="2.5" transform="rotate(15 200 20)" fill="#E8650A" opacity="0.8"/>
        <ellipse cx="280" cy="8" rx="6" ry="2.5" transform="rotate(-15 280 8)" fill="#E8650A" opacity="0.8"/>
      </svg>
    </div>

    <div class="buttons-area">
      <!-- Ряд 1 -->
      <button class="btn btn-special" data-action="clear">АС</button>
      <button class="btn btn-special" data-action="sign">±</button>
      <button class="btn btn-special" data-action="percent">%</button>
      <button class="btn btn-op" data-action="op" data-op="÷">÷</button>

      <!-- Ряд 2 -->
      <button class="btn btn-num" data-action="num" data-num="7">7</button>
      <button class="btn btn-num" data-action="num" data-num="8">8</button>
      <button class="btn btn-num" data-action="num" data-num="9">9</button>
      <button class="btn btn-op" data-action="op" data-op="×">×</button>

      <!-- Ряд 3 -->
      <button class="btn btn-num" data-action="num" data-num="4">4</button>
      <button class="btn btn-num" data-action="num" data-num="5">5</button>
      <button class="btn btn-num" data-action="num" data-num="6">6</button>
      <button class="btn btn-op" data-action="op" data-op="−">−</button>

      <!-- Ряд 4 -->
      <button class="btn btn-num" data-action="num" data-num="1">1</button>
      <button class="btn btn-num" data-action="num" data-num="2">2</button>
      <button class="btn btn-num" data-action="num" data-num="3">3</button>
      <button class="btn btn-op" data-action="op" data-op="+">+</button>

      <!-- Ряд 5 -->
      <button class="btn btn-num btn-zero" data-action="num" data-num="0">0</button>
      <button class="btn btn-num" data-action="dot">•</button>
      <button class="btn btn-equals" data-action="equals">=</button>
    </div>

    <div class="bottom-ornament"></div>
  </div>
</div>

<script>
  let display = '0';
  let expression = '';
  let firstNum = null;
  let operator = null;
  let waitingForSecond = false;
  let justCalculated = false;

  const displayEl = document.getElementById('display');
  const exprEl = document.getElementById('expression');

  function updateDisplay(val) {
    displayEl.textContent = val;
    displayEl.classList.add('flash');
    setTimeout(() => displayEl.classList.remove('flash'), 150);
  }

  function handleNum(n) {
    if (justCalculated) {
      display = n;
      expression = '';
      justCalculated = false;
    } else if (waitingForSecond) {
      display = n;
      waitingForSecond = false;
    } else {
      display = display === '0' ? n : (display.length < 12 ? display + n : display);
    }
    updateDisplay(display);
  }

  function handleDot() {
    if (justCalculated) { display = '0.'; justCalculated = false; }
    else if (waitingForSecond) { display = '0.'; waitingForSecond = false; }
    else if (!display.includes('.')) display += '.';
    updateDisplay(display);
  }

  function handleOp(op) {
    justCalculated = false;
    if (operator && !waitingForSecond) {
      const result = calculate(parseFloat(firstNum), parseFloat(display), operator);
      firstNum = result;
      display = formatResult(result);
      updateDisplay(display);
    } else {
      firstNum = display;
    }
    operator = op;
    waitingForSecond = true;
    expression = display + ' ' + op;
    exprEl.textContent = expression;
  }

  function handleEquals() {
    if (operator === null || waitingForSecond) return;
    const a = parseFloat(firstNum);
    const b = parseFloat(display);
    const result = calculate(a, b, operator);
    exprEl.textContent = firstNum + ' ' + operator + ' ' + display + ' =';
    display = formatResult(result);
    updateDisplay(display);
    operator = null;
    firstNum = null;
    waitingForSecond = false;
    justCalculated = true;
  }

  function calculate(a, b, op) {
    switch(op) {
      case '+': return a + b;
      case '−': return a - b;
      case '×': return a * b;
      case '÷': return b !== 0 ? a / b : 'Ошибка';
    }
  }

  function formatResult(r) {
    if (r === 'Ошибка') return r;
    if (Math.abs(r) > 1e12) return r.toExponential(4);
    const s = parseFloat(r.toFixed(8)).toString();
    return s.length > 12 ? parseFloat(r.toPrecision(8)).toString() : s;
  }

  function handleClear() {
    display = '0'; expression = '';
    firstNum = null; operator = null;
    waitingForSecond = false; justCalculated = false;
    updateDisplay('0');
    exprEl.textContent = '';
  }

  function handleSign() {
    display = display.startsWith('-') ? display.slice(1) : (display !== '0' ? '-' + display : '0');
    updateDisplay(display);
  }

  function handlePercent() {
    display = String(parseFloat(display) / 100);
    updateDisplay(display);
  }

  // Ripple effect
  function addRipple(btn, e) {
    const rect = btn.getBoundingClientRect();
    const ripple = document.createElement('span');
    ripple.className = 'ripple';
    ripple.style.left = (e.clientX - rect.left) + 'px';
    ripple.style.top = (e.clientY - rect.top) + 'px';
    btn.appendChild(ripple);
    setTimeout(() => ripple.remove(), 400);
  }

  document.querySelectorAll('.btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      addRipple(btn, e);
      const action = btn.dataset.action;
      if (action === 'num') handleNum(btn.dataset.num);
      else if (action === 'op') handleOp(btn.dataset.op);
      else if (action === 'equals') handleEquals();
      else if (action === 'clear') handleClear();
      else if (action === 'sign') handleSign();
      else if (action === 'percent') handlePercent();
      else if (action === 'dot') handleDot();
    });
  });

  // Клавиатура
  document.addEventListener('keydown', (e) => {
    if (e.key >= '0' && e.key <= '9') handleNum(e.key);
    else if (e.key === '+') handleOp('+');
    else if (e.key === '-') handleOp('−');
    else if (e.key === '*') handleOp('×');
    else if (e.key === '/') { e.preventDefault(); handleOp('÷'); }
    else if (e.key === 'Enter' || e.key === '=') handleEquals();
    else if (e.key === 'Escape') handleClear();
    else if (e.key === '.' || e.key === ',') handleDot();
    else if (e.key === 'Backspace') {
      if (display.length > 1) display = display.slice(0, -1);
      else display = '0';
      updateDisplay(display);
    }
  });
</script>
</body>
</html>
